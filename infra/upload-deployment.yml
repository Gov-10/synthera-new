apiVersion: apps/v1
kind: Deployment
metadata:
  name: upload-deploy
spec:
  replicas: 3
  selector:
    matchLabels:
      app: upload-app
  template:
    metadata:
      labels:
        app: upload-app
  spec:
    containers:
      - name: upload-app
        image:
        ports:
          - containerPort: 4001
        envFrom:
          - secretRef:
              name: upload-secret
